    }
    .content {

    .rec-page { width:90vw; max-width:420px; margin:0 auto; padding:78px 0 90px 0; box-sizing:border-box; animation: fadeIn .3s; }
    .rec-page.ad-mode { width:100vw; max-width:100vw; padding:0 0 90px 0; }
    .subheader.ad-mode { min-height:0 !important; margin:0 !important; padding:0 !important; font-size:0 !important; }
    
    #rec-ad-block { width:100%; overflow:hidden; position:relative; user-select:none; padding-top:64px; }

    }
    .rec-step.active .rec-step-dot { background:linear-gradient(135deg,#e0102f 0%,#a4001c 100%); color:#fff; box-shadow:0 2px 8px rgba(194,0,33,0.35); }

    .rec-step-label { font-size:0.64em; font-weight:700; color:#b7b3b8; text-transform:uppercase; letter-spacing:.03em; }

    .rec-step.done .rec-step-label { color:#46455e; }
    .rec-ad-card {

      box-shadow:0 4px 16px rgba(64,64,90,0.14); margin-bottom:20px; background:#fff;

    .rec-ad-card img { width:100%; height:100%; object-fit:cover; display:block; transition:opacity .7s; }
    .rec-ad-tag {
      position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.45); color:#fff;
      font-size:0.62em; font-weight:700; text-transform:uppercase; letter-spacing:.05em;
      padding:4px 9px; border-radius:20px;
    }
    .rec-summary-card {
      display:flex; align-items:center; gap:12px; border-radius:16px; padding:16px 18px;
      background:linear-gradient(135deg,#e0102f 0%,#a4001c 100%); color:#fff;
      box-shadow:0 6px 18px rgba(194,0,33,0.28); margin-bottom:20px; animation:slideCard .35s;
    }
    .rec-summary-icon {
      width:44px; height:44px; min-width:44px; border-radius:12px; background:rgba(255,255,255,0.18);
      display:flex; align-items:center; justify-content:center;
    }
    .rec-summary-text { display:flex; flex-direction:column; gap:2px; min-width:0; flex:1 1 auto; }
    .rec-summary-text .rec-summary-main { font-size:1.05em; font-weight:800; letter-spacing:.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .rec-summary-text .rec-summary-sub { font-size:0.76em; color:rgba(255,255,255,0.82); font-weight:600; }
    .rec-summary-value { margin-left:auto; text-align:right; font-size:1.1em; font-weight:800; white-space:nowrap; flex-shrink:0; }
    @keyframes slideCard {
      from { transform: translateY(30px) scale(.96); opacity:0; }
      to   { transform: translateY(0) scale(1);  opacity:1;}
    }
    .rec-question {
      font-size:1.0em; font-weight:800; color:#46455e;
      margin:2px 2px 12px 2px;
    }
   @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px);}
      to   { opacity: 1; transform: translateY(0);}
    }
    .rec-divider { display:flex; align-items:center; gap:10px; margin:16px 2px 4px 2px; color:#c2c0c5; font-size:0.7em; font-weight:700; text-transform:uppercase; letter-spacing:.06em; }
    .rec-divider::before, .rec-divider::after { content:''; flex:1 1 auto; height:1px; background:#ece8eb; }
    .rec-secondary-btn {
      display:flex; align-items:center; justify-content:center; gap:8px;
      width:100%; margin-top:12px; background:#fff; border:1.6px solid #c20021;
      color:#c20021; border-radius:12px; height:48px; font-size:0.96em;
      font-weight:700; cursor:pointer; transition:background .15s, transform .15s; box-sizing:border-box;
    }
    .rec-secondary-btn:active { background:#fbe9ea; transform:scale(0.98); }
    .fis-input-group .rec-eye-btn {
      margin-right:10px; background:none; border:none; color:#999; cursor:pointer;
      display:flex; align-items:center; padding:4px; flex-shrink:0;
    }
    .erro {color:#e74c3c; font-weight:600; margin:15px auto 0 auto;
      text-align:center;font-size:1em;max-width:340px;}
    .loading-bg {
      position:fixed; top:0; left:0; right:0; bottom:0; width:100vw;height:100vh;
      background:rgba(255,255,255,0.91); z-index:999; display:flex; justify-content:center; align-items:center; flex-direction:column; animation:fadeIn .33s;
    }
    .circle-loader {
      border:7px solid #ededed; border-top:7px solid #c20021;
      border-radius:50%; width:56px; height:56px;
      animation:spin .85s linear infinite; margin-bottom:9px;
    }
    @keyframes spin {0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
    .loading-text {color:#c20021;font-size:1.12em;font-weight:700;}
   .footer {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: auto;
  min-height: 59px;
  background: #c20021;
  display: flex;
  justify-content: space-around;
  align-items: stretch;
  z-index: 11;
  transition: none; 
  padding-bottom: env(safe-area-inset-bottom, 0);

}
.footer.hide {
  display: none !important;
}
.footer-item {
  flex: 1 1 0;
  min-width: 0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:#fff;
  font-size: clamp(0.62em, 2.6vw, 0.93em);

  cursor:pointer;
  text-decoration:none;
  padding: 5px 2px;
  transition:color .15s;

}
.footer-item svg {

}
.footer-item.active {color:#11bcaa;}

@media (max-width: 360px) {
  .footer-item { padding: 4px 1px; }
}
.fab-footer-btn {
  position: fixed;
  bottom: 70px;

  background: #f9b1b1;

@media (max-width: 360px) {

    .list-container {

  <script>

    const getHistory = () => JSON.parse(localStorage.getItem('recargaHistory') || '[]');
    const saveHistory = (item) => {
      const history = getHistory();
      history.unshift(item);
      localStorage.setItem('recargaHistory', JSON.stringify(history));
    };
  
    const getContacts = () => JSON.parse(localStorage.getItem('recargaContacts') || '[]');
    const saveContacts = (contacts) => localStorage.setItem('recargaContacts', JSON.stringify(contacts));
    const addContact = (name, number) => {
      const contacts = getContacts();
      contacts.unshift({ name, number });
      saveContacts(contacts);
    };
    const removeContact = (number) => {
      let contacts = getContacts();
      contacts = contacts.filter(contact => contact.number !== number);
      saveContacts(contacts);
    };

    function setSubheader(txt) {
      document.getElementById('subheader').innerText = txt || '';
    }
    function showErro(msg) {
      document.getElementById('content').insertAdjacentHTML('beforeend', `<div class="erro">${msg}</div>`);
    }
    function clearErro() {
      document.querySelectorAll('.erro').forEach(e=>e.remove());
    }
    function setActiveFooter(activeId) {
      document.querySelectorAll('.footer-item').forEach(item => item.classList.remove('active'));
      document.getElementById(activeId).classList.add('active');
    }

    function getRecBootOverlayHtml() {
      if(appBootShown) return '';
      return '<div id="recBootOverlay" style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;justify-content:center;align-items:center;background:#fff;z-index:5;"><div style="width:38vw;max-width:150px;">' + recBootOverlaySvg + '</div></div>';
    }

    const recPhoneIconSvg = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20" height="20">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5H8.25A2.25 2.25 0 0 0 6 3.75v16.5a2.25 2.25 0 0 0 2.25 2.25h7.5A2.25 2.25 0 0 0 18 20.25V3.75a2.25 2.25 0 0 0-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-3 18.75h3" />
    </svg>`;

    function recStepsHtml(current) {
      const steps = [ {n:1, label:'Número'}, {n:2, label:'Valor'}, {n:3, label:'PIN'} ];
      return `<div class="rec-steps">` + steps.map(s => {
        const state = s.n < current ? 'done' : (s.n === current ? 'active' : '');
        return `<div class="rec-step ${state}">
          <span class="rec-step-dot">${s.n < current ? '✓' : s.n}</span>
          <span class="rec-step-label">${s.label}</span>
        </div>`;
      }).join('') + `</div>`;
    }

    function recSummaryCard(showValor) {
      return `
        <div class="rec-summary-card">
          <div class="rec-summary-icon">${recPhoneIconSvg.replace('currentColor','#fff')}</div>
          <div class="rec-summary-text">
            <span class="rec-summary-main">+244 ${temp.numero}</span>
            <span class="rec-summary-sub">Recarga directa Movicel</span>
          </div>
          ${showValor ? `<div class="rec-summary-value">AKZ ${temp.valor}</div>` : ''}
        </div>`;
    }

    function setValorRecarga(val, btn) {
      document.getElementById('valor').value = val;
      document.querySelectorAll('.fis-value-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    }

              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 0 1 3 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 0 0-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 0 1-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 0 0 3 15h-.75M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm3 0h.008v.008H18V10.5Zm-12 0h.008v.008H6V10.5Z"/>
              </svg>
              Consultar Meu Saldo
            </button>
          </div>

        </div>
      `;

      (function(){
        var track = document.getElementById('rec-ad-swipe-track');
        if(!track) return;
        var dots = document.querySelectorAll('#rec-ad-dots span');
        var total = track.children.length;
        var cur = 0;
        var autoId;

        function goTo(n) {
          cur = (n + total) % total;
          track.style.transform = 'translateX(-' + (cur * 100) + '%)';
          dots.forEach(function(d,i){ d.classList.toggle('active', i===cur); });
        }

        function startAuto() { autoId = setInterval(function(){ goTo(cur+1); }, 4000); }
        function stopAuto()  { clearInterval(autoId); }

        startAuto();


        var startX = 0, dragging = false, moved = 0;
        track.addEventListener('touchstart', function(e){
          startX = e.touches[0].clientX; dragging = true; moved = 0; stopAuto();
          track.style.transition = 'none';
        }, {passive:true});
        track.addEventListener('touchmove', function(e){
          if(!dragging) return;
          moved = e.touches[0].clientX - startX;
          track.style.transform = 'translateX(calc(-'+(cur*100)+'% + '+moved+'px))';
        }, {passive:true});
        track.addEventListener('touchend', function(){
          track.style.transition = '';
          if(moved < -50) goTo(cur+1);
          else if(moved > 50) goTo(cur-1);
          else goTo(cur);
          dragging = false; startAuto();
        });


        track.addEventListener('mousedown', function(e){
          startX = e.clientX; dragging = true; moved = 0; stopAuto();
          track.style.transition = 'none'; e.preventDefault();
        });
        window.addEventListener('mousemove', function(e){
          if(!dragging) return;
          moved = e.clientX - startX;
          track.style.transform = 'translateX(calc(-'+(cur*100)+'% + '+moved+'px))';
        });
        window.addEventListener('mouseup', function(){
          if(!dragging) return;
          track.style.transition = '';
          if(moved < -50) goTo(cur+1);
          else if(moved > 50) goTo(cur-1);
          else goTo(cur);
          dragging = false; startAuto();
        });
      })();

      const recBootOverlay = document.getElementById('recBootOverlay');
      if(recBootOverlay) {
        appBootShown = true;
        setTimeout(function() {
          recBootOverlay.style.transition = 'opacity .25s';
          recBootOverlay.style.opacity = '0';
          setTimeout(() => recBootOverlay.remove(), 250);
        }, 2000);
      }
    }

    function selectValorRapido(val, btnEl) {

      if (btnEl) {
        const r = document.createElement('span');
        r.className = 'ripple';
        const rect = btnEl.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        r.style.cssText = `width:${size}px;height:${size}px;left:${(rect.width-size)/2}px;top:${(rect.height-size)/2}px`;
        btnEl.appendChild(r);
        r.addEventListener('animationend', () => r.remove());
      }

      setTimeout(() => {
        temp.valor = val;
        mostrarFormRecarga();
      }, 220);
    }

    function mostrarFormRecarga() {
      const adBlock = document.getElementById('rec-ad-block');
      const formBlock = document.getElementById('rec-form-block');
      const page = document.getElementById('rec-page-root');
      document.getElementById('subheader').classList.remove('ad-mode');
      if (adBlock) adBlock.style.display = 'none';
      if (page) page.classList.remove('ad-mode');
      if (formBlock) {
        formBlock.style.display = '';

        const banner = document.getElementById('rec-valor-banner');
        if (banner) {
          if (temp.valor) {
            banner.innerHTML = `
              <div class="rec-valor-selected-banner">

                  <svg viewBox="0 0 24 24" width="19" height="19" fill="white"><path d="M5,6H23V18H5V6M14,9A3,3 0 0,1 17,12A3,3 0 0,1 14,15A3,3 0 0,1 11,12A3,3 0 0,1 14,9M9,8A2,2 0 0,1 7,10H9V8M9,16H7A2,2 0 0,1 9,18V16M19,16V18A2,2 0 0,1 21,16H19M19,8H21A2,2 0 0,1 19,10V8M1,10H3V20H19V22H1V10Z"/></svg>

                </div>
                <button type="button" class="rvs-change" onclick="renderTela1()">Alterar</button>
              </div>`;

            const btn = document.getElementById('rec-form-btn');
            if (btn) btn.innerHTML = `<svg viewBox="0 0 24 24"><path fill="white" d="M9.5 18.6L3.9 13L5.3 11.6L9.5 15.8L18.7 6.6L20.1 8Z"/></svg> Ir para o PIN`;
          } else {
            banner.innerHTML = '';
          }
        }
        setTimeout(()=>{ const n=document.getElementById('numero'); if(n) n.focus(); }, 80);
      }
    }

    function nextTela1() {
      clearErro();
      const num = document.getElementById('numero').value.trim().replace(/\D/g, '');
      if(num.length !== 9 || !(num.startsWith('91') || num.startsWith('99') || num.startsWith('997') || num.startsWith('998'))) {
        showErro('Digite um número Movicel válido (91x/99x).');
        return;
      }
      temp.numero = num;

      if(temp.valor) {
        renderTela3();
      } else {
        renderTela2();
      }
    }

    function renderTela2() {
      setSubheader('');
      setActiveFooter('nav-home');
      clearErro();
      const valoresRapidos = [200, 500, 1000, 2000];
      document.getElementById('content').innerHTML = `
        <div class="rec-page">

          ${recSummaryCard(false)}

          <div class="rec-question">Qual o valor da recarga?</div>

function cartaoJaUsado(cartao) {
  const history = getHistory();
  return history.some(it => it.tipo === 'fisica' && it.cartao === cartao);
}

function nextRecargaFisica() {
  clearErro();
  const cartao = document.getElementById('numCartao').value.trim().replace(/\D/g, '');
  const num = document.getElementById('numRecarga').value.trim().replace(/\D/g, '');
  const valorCartao = document.getElementById('valorCartao').value.trim();

  if(cartao.length !== 13) {
    showErro('Digite o cartão correto (13 dígitos).');
    return;
  }
  if(!valorCartao || Number(valorCartao) <= 0) {
    showErro('Defina o valor do cartão (500, 850, 1000 KZ ou outro) antes de enviar.');
    return;
  }
  if(num.length !== 9 || !(num.startsWith('91')||num.startsWith('99')||num.startsWith('997')||num.startsWith('998'))) {
    showErro('Número deve começar com 91/99.');
    return;
  }
  if(cartaoJaUsado(cartao)) {
    showErro('Este cartão já foi utilizado anteriormente. Um cartão físico só pode ser usado uma vez.');
    return;
  }

  document.getElementById('loading').style.display = '';
  setTimeout(()=>{
    document.getElementById('loading').style.display = 'none';

    saveHistory({
      tipo: 'fisica', cartao: cartao, numero: num, valor: Number(valorCartao),
      data: new Date().toLocaleString()
    });

    let comando = `*198*${cartao}*${num}#`;
    let telComando = encodeURIComponent(comando);

    location.href = `tel:${telComando}`;

    renderRecargaFisica();
  }, 900);
}



    let histSearch = '';


    function parseHistDate(str) {
      if(!str) return new Date(NaN);
      const m = String(str).match(/(\d{1,2})\/(\d{1,2})\/(\d{4})[,\s]+(\d{1,2}):(\d{2})(?::(\d{2}))?/);
      if(m) {
        return new Date(+m[3], +m[2]-1, +m[1], +m[4], +m[5], +(m[6]||0));
      }
      return new Date(str);
    }

    function histGroupLabel(date) {
      if(isNaN(date.getTime())) return 'Sem data';
      const isSameDay = (a,b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
      const now = new Date();
      const yesterday = new Date(now); yesterday.setDate(now.getDate()-1);
      if(isSameDay(date, now)) return 'Hoje';
      if(isSameDay(date, yesterday)) return 'Ontem';
      const label = date.toLocaleDateString('pt-PT', { day:'2-digit', month:'long', year:'numeric' });
      return label.charAt(0).toUpperCase() + label.slice(1);
    }

    function clearAllHistory() {

    function cntEscape(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
    }
    function cntInitials(name) {
      const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
      if(parts.length === 0) return '?';
      if(parts.length === 1) return parts[0].slice(0,2).toUpperCase();
      return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
    }

                <button class="cnt-icon-btn cnt-del" onclick="removeContactAndRender('${contact.number}')" aria-label="Remover contacto" title="Remover">
                  <svg viewBox="0 0 24 24" width="17" height="17"><path fill="currentColor" d="M9 3v1H4v2h1v13a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6h1V4h-5V3H9zm2 5h2v9h-2V8zm-4 0h2v9H7V8zm8 0h2v9h-2V8z"/></svg>
                </button>
              </div>
            </div>`;
        });
        html += `</div>`;
      }

      html += '</div>';
      document.getElementById('content').innerHTML = html;

      if(keepSearchFocus) {
        const inp = document.getElementById('cntSearchInput');
        if(inp) {
          inp.focus();
          const len = inp.value.length;
          inp.setSelectionRange(len, len);
        }
      }
    }

    function addContactFromForm() {
      clearErro();
      const name = document.getElementById('contactName').value.trim();
      const number = document.getElementById('contactNumber').value.trim().replace(/\D/g, '');
      if(!name) { showErro('Nome do contacto não pode ser vazio.'); return; }
      if(number.length !== 9 || !(number.startsWith('91')||number.startsWith('99')||number.startsWith('997')||number.startsWith('998'))) {
        showErro('Número deve começar com 91/99.');
        return;
      }
      const contacts = getContacts();
      if(contacts.some(c=>c.number===number)) {
        showErro('Este número já está salvo nos contactos.'); return;
      }
      addContact(name, number);
      cntFormOpen = false;
      localStorage.setItem('showAddContact', '0');
      renderContactsView();
    }
    function removeContactAndRender(number) {
      showConfirmModal('Deseja remover este contacto?', () => {
        removeContact(number);
        renderContactsView();
      });
    }
    function useContactForRecarga(number) { temp.numero=number; renderTela1(); mostrarFormRecarga(); }

    
    document.getElementById('nav-home').addEventListener('click', renderTela1);
    document.getElementById('nav-fisico').addEventListener('click', renderRecargaFisica);
    document.getElementById('nav-history').addEventListener('click', renderHistory);
    document.getElementById('nav-contacts').addEventListener('click', renderContacts);
    document.getElementById('nav-settings').addEventListener('click', renderSettings);


    function showConfirmModal(msg, onConfirm) {
      const existing = document.getElementById('customConfirmModal');
      if(existing) existing.remove();
      const modal = document.createElement('div');
      modal.id = 'customConfirmModal';
      modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:center;justify-content:center;';
      modal.innerHTML = `
        <div style="background:#fff;border-radius:14px;padding:26px 24px 18px 24px;max-width:310px;width:90vw;box-shadow:0 4px 22px rgba(0,0,0,0.22);text-align:center;">
          <p style="font-size:1.05em;color:#333;margin:0 0 20px 0;font-weight:600;">${msg}</p>
          <div style="display:flex;gap:12px;justify-content:center;">
            <button id="confirmNo" style="flex:1;padding:10px;border-radius:8px;border:1.5px solid #ccc;background:#f5f5f5;font-size:1em;cursor:pointer;font-weight:600;">Cancelar</button>
            <button id="confirmYes" style="flex:1;padding:10px;border-radius:8px;border:none;background:#c20021;color:#fff;font-size:1em;cursor:pointer;font-weight:700;">Confirmar</button>
          </div>
        </div>`;
      document.body.appendChild(modal);
      document.getElementById('confirmYes').onclick = () => { modal.remove(); onConfirm(); };
      document.getElementById('confirmNo').onclick = () => modal.remove();
    }


    function getPIN() { return localStorage.getItem('userPIN') || '8989'; }
    function setPIN(newPin) { localStorage.setItem('userPIN', newPin); }

    renderTela1();

function getTotalRecargas() {
  const history = getHistory();

  return history.reduce((total, recarga) => total + Number(recarga.valor || 0), 0);
}


function updateValorTotal() {
  const el = document.getElementById('valorTotal');
  if(el) {
    const totalAkz = getTotalRecargas();
    el.innerText = `Total recarregado: AKZ ${totalAkz}`;
  }
}

let currentSlide = 0;
function moveCarousel(dir) {
  const slides = document.querySelectorAll('.carousel-slide');
  currentSlide = (currentSlide + dir + slides.length) % slides.length;
  document.querySelector('.carousel-track').style.transform = 
    `translateX(-${currentSlide * 100}%)`;
}

setInterval(()=>moveCarousel(1), 4000);


function toggleAddContactForm() {
  const wrapper = document.getElementById('addContactWrapper');
  const btn = document.getElementById('cntAddBtn');
  const hidden = wrapper.classList.toggle('hide');
  cntFormOpen = !hidden;
  localStorage.setItem('showAddContact', hidden ? '0' : '1');
  if(btn) btn.classList.toggle('is-open', !hidden);
  if(!hidden) {
    setTimeout(() => { const inp = document.getElementById('contactName'); if(inp) inp.focus(); }, 80);
  }
}
  </script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const footer = document.getElementById('mainFooter');
    const btn = document.getElementById('toggleFooterBtn');


    const savedState = localStorage.getItem('showFooter');
    if (savedState === 'hidden') {
      footer.classList.add('hide');
    } else {
      footer.classList.remove('hide');
    }

    btn.addEventListener('click', () => {
      const isHidden = footer.classList.toggle('hide');

      localStorage.setItem('showFooter', isHidden ? 'hidden' : 'visible');
    });
  });
</script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const img = document.getElementById('imgAboutMe');
    const overlay = document.getElementById('overlayAboutMe');
    const btnClose = document.getElementById('btnCloseAbout');

    let pressTimer;


    img.addEventListener('mousedown', startPress);
    img.addEventListener('touchstart', startPress);


    img.addEventListener('mouseup', cancelPress);
    img.addEventListener('mouseleave', cancelPress);
    img.addEventListener('touchend', cancelPress);
    img.addEventListener('touchcancel', cancelPress);

    function startPress(e) {

      e.preventDefault();
      pressTimer = setTimeout(() => {
        overlay.style.display = 'block';
      }, 100);
    }

    function cancelPress() {
      clearTimeout(pressTimer);
    }


    btnClose.addEventListener('click', () => {
      overlay.style.display = 'none';
    });
  });
</script>

<script>

  function alterarPIN() {
    const atual = document.getElementById('pinAtual').value.trim();
    const novo = document.getElementById('pinNovo').value.trim();
    const msg = document.getElementById('pinMsg');
    if(atual !== getPIN()) {
      msg.style.color='#c20021'; msg.textContent = 'PIN atual incorreto.'; return;
    }
    if(novo.length < 4 || !/^\d+$/.test(novo)) {
      msg.style.color='#c20021'; msg.textContent = 'Novo PIN deve ter 4-6 dígitos numéricos.'; return;
    }
    setPIN(novo);
    msg.style.color='#c20021'; msg.textContent = 'PIN alterado com sucesso! ✓';
    document.getElementById('pinAtual').value = '';
    document.getElementById('pinNovo').value = '';
  }
</script>
